name: Check scripts

on:
  push:
    branches: [master]
    paths:
      - "scripts/**"
      - ".github/workflows/check.yml"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Compile
        run: python3 -m py_compile scripts/update_languages.py

      - name: Unit tests
        run: python3 -m unittest discover -s scripts -p "test_*.py"
